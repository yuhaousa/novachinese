<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NovaRead Admin · 课程管理</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">
<div class="app" id="app">
  <main class="main" id="main">
    <div class="content">
      <div class="admin-shell">
        <section class="admin-hero animate-in">
          <div class="admin-hero-copy">
            <div class="admin-kicker">后台管理模式 · 课程管理</div>
            <h1 class="admin-hero-title">统一维护课程目录、课程状态与学习流入口</h1>
            <p class="admin-hero-subtitle">这里集中管理前台课程列表中的课程卡片、学段分类、课程状态，以及它们进入的是完整学习流程还是独立内容页。当前版本已经接入 D1，可直接保存课程基础配置。</p>
          </div>
          <div class="admin-actions">
            <a href="overview.html" class="admin-btn admin-btn-primary">查看前台课程页</a>
            <a href="course-content.html?course=back" class="admin-btn admin-btn-secondary" id="admin-course-preview">预览课程内容页</a>
          </div>
        </section>

        <section class="admin-card animate-in" style="animation-delay:.06s">
          <div class="admin-toolbar">
            <div class="admin-filter-row">
              <span class="admin-filter active">全部课程 <strong id="admin-course-total">10</strong></span>
              <span class="admin-filter">初一</span>
              <span class="admin-filter">初二</span>
              <span class="admin-filter">初三</span>
              <span class="admin-filter">完整学习流程</span>
              <span class="admin-filter">独立内容页</span>
            </div>
            <a href="admin-course-create.html" class="admin-btn admin-btn-primary">新建课程</a>
          </div>
          <div class="admin-note" id="admin-course-status">正在读取课程数据...</div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>课程</th>
                  <th>创建时间</th>
                  <th>学段</th>
                  <th>体裁</th>
                  <th>页面类型</th>
                  <th>前台入口</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="admin-course-rows">
                <tr>
                  <td colspan="8">正在加载课程列表...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </main>
</div>
<script src="admin-courses-data.js?v=20260426-course-created-at"></script>
<script src="admin-shell.js"></script>
</body>
</html>
