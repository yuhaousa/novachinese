<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NovaRead Admin · 课程编辑</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">
<div class="app" id="app">
  <main class="main" id="main">
    <div class="content">
      <div class="admin-shell">
        <section class="admin-hero animate-in">
          <div class="admin-hero-copy">
            <div class="admin-kicker">后台管理模式 · 课程编辑</div>
            <h1 class="admin-hero-title">编辑课程基础信息、发布状态与封面</h1>
            <p class="admin-hero-subtitle">这里专门负责课程基础配置。保存后会直接写入 D1，封面上传会写入 R2，并同步影响前台课程目录与课程内容入口。</p>
          </div>
          <div class="admin-actions">
            <a href="admin-courses.html" class="admin-btn admin-btn-primary">返回课程管理</a>
            <a href="course-content.html?course=back" class="admin-btn admin-btn-secondary" id="admin-course-preview">预览课程内容页</a>
          </div>
        </section>

        <section class="admin-card animate-in" style="animation-delay:.06s">
          <div class="admin-card-header">
            <div>
              <div class="admin-card-title">课程编辑器</div>
              <div class="admin-card-desc">修改课程标题、作者、学段、体裁、页面类型、入口路由、发布状态和封面。</div>
            </div>
            <span class="admin-pill slate" id="admin-course-mode">编辑模式</span>
          </div>

          <form id="admin-course-form" class="admin-form">
            <div class="admin-form-grid">
              <label class="admin-field">
                <span class="admin-field-label">课程标识</span>
                <input id="course-slug" class="admin-input" type="text" readonly />
              </label>
              <label class="admin-field">
                <span class="admin-field-label">课程标题</span>
                <input id="course-title" class="admin-input" type="text" required />
              </label>
              <label class="admin-field">
                <span class="admin-field-label">作者</span>
                <input id="course-author" class="admin-input" type="text" required />
              </label>
              <label class="admin-field">
                <span class="admin-field-label">学段 / 分层</span>
                <input id="course-stage" class="admin-input" type="text" required />
              </label>
              <label class="admin-field">
                <span class="admin-field-label">体裁</span>
                <input id="course-genre" class="admin-input" type="text" required />
              </label>
              <label class="admin-field">
                <span class="admin-field-label">页面类型</span>
                <select id="course-source-type" class="admin-select">
                  <option value="content-page">独立内容页</option>
                  <option value="full-flow">完整学习流程</option>
                </select>
              </label>
              <label class="admin-field admin-field-span-2">
                <span class="admin-field-label">前台入口路由</span>
                <input id="course-route" class="admin-input" type="text" required />
              </label>
              <label class="admin-field">
                <span class="admin-field-label">发布状态</span>
                <select id="course-status" class="admin-select">
                  <option value="published">已发布</option>
                  <option value="draft">草稿</option>
                </select>
              </label>
              <label class="admin-field admin-field-span-2">
                <span class="admin-field-label">封面图片（R2 上传）</span>
                <input id="course-cover-file" class="admin-input" type="file" accept="image/*" />
              </label>
            </div>

            <div class="admin-form-status" id="admin-course-form-status" data-tone="neutral">正在读取课程数据...</div>

            <div class="admin-cover-panel">
              <div class="admin-cover-preview-wrap">
                <img id="course-cover-preview" class="admin-cover-preview" alt="课程封面预览" />
              </div>
              <div class="admin-cover-actions">
                <button type="button" class="admin-btn admin-btn-light" id="admin-cover-upload">上传到 R2 并绑定课程</button>
                <div class="admin-card-desc">上传后会把图片写入 R2，并更新当前课程的封面地址。前台课程卡片会优先使用上传后的图片。</div>
              </div>
            </div>

            <div class="admin-actions">
              <button type="submit" class="admin-btn admin-btn-primary" id="admin-course-save">保存到数据库</button>
              <button type="button" class="admin-btn admin-btn-secondary" id="admin-course-reset">重置表单</button>
              <a class="admin-btn admin-btn-light" id="admin-course-content-link" href="admin-content.html">编辑内容块</a>
              <button type="button" class="admin-btn admin-btn-danger" id="admin-course-delete">删除当前课程</button>
            </div>
          </form>
        </section>
      </div>
    </div>
  </main>
</div>
<script src="admin-course-edit.js"></script>
<script src="admin-shell.js"></script>
</body>
</html>
