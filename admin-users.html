<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NovaRead Admin · 用户管理</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">
<div class="app" id="app">
  <main class="main" id="main">
    <div class="content">
      <div class="admin-shell">
        <section class="admin-hero animate-in">
          <div class="admin-hero-copy">
            <div class="admin-kicker">后台管理模式 · 用户管理</div>
            <h1 class="admin-hero-title">查看平台用户、登录活跃度与账号状态</h1>
            <p class="admin-hero-subtitle">这里集中展示用户邮箱、姓名、角色、学校班级、登录次数、最近登录时间和创建时间，便于后续做学习数据与权限管理。</p>
          </div>
        </section>

        <section class="admin-grid-4">
          <div class="admin-card animate-in" style="animation-delay:.05s">
            <div class="admin-stat-value" id="admin-user-total">0</div>
            <div class="admin-stat-label">用户总数</div>
            <div class="admin-stat-desc">当前用户表中的账号数量。</div>
          </div>
          <div class="admin-card animate-in" style="animation-delay:.08s">
            <div class="admin-stat-value" id="admin-user-active">0</div>
            <div class="admin-stat-label">活跃用户</div>
            <div class="admin-stat-desc">最近 30 天有登录记录的用户。</div>
          </div>
          <div class="admin-card animate-in" style="animation-delay:.11s">
            <div class="admin-stat-value" id="admin-user-login-total">0</div>
            <div class="admin-stat-label">累计登录</div>
            <div class="admin-stat-desc">用户登录次数汇总。</div>
          </div>
          <div class="admin-card animate-in" style="animation-delay:.14s">
            <div class="admin-stat-value" id="admin-user-student-total">0</div>
            <div class="admin-stat-label">学生账号</div>
            <div class="admin-stat-desc">角色为 student 的账号数量。</div>
          </div>
        </section>

        <section class="admin-card animate-in" style="animation-delay:.18s">
          <div class="admin-toolbar">
            <div>
              <div class="admin-card-title">用户信息表</div>
              <div class="admin-card-desc">按最近登录时间优先排序。没有登录记录的用户会排在后面。</div>
            </div>
            <div class="admin-filter-row">
              <span class="admin-filter active" id="admin-user-source">读取中</span>
            </div>
          </div>

          <div class="admin-form-status" id="admin-user-status" data-tone="neutral">正在读取用户数据...</div>

          <div class="admin-table-wrap" style="margin-top:16px;">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>用户</th>
                  <th>邮箱</th>
                  <th>角色</th>
                  <th>学校 / 班级</th>
                  <th>登录次数</th>
                  <th>最近登录时间</th>
                  <th>创建时间</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="admin-user-rows">
                <tr>
                  <td colspan="8">正在加载...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </main>
</div>
<script src="admin-users-data.js"></script>
<script src="admin-shell.js"></script>
</body>
</html>
