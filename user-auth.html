<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NovaRead AI语文 · 用户登录</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .auth-shell {
    max-width: 1080px;
    margin: 0 auto;
    min-height: calc(100vh - 96px);
    display: grid;
    grid-template-columns: minmax(0, 1fr) 420px;
    gap: 28px;
    align-items: center;
    padding: 32px 0;
  }

  .auth-hero {
    min-height: 520px;
    border-radius: 34px;
    padding: 44px;
    color: #fff;
    background:
      radial-gradient(circle at 82% 18%, rgba(253, 224, 71, 0.45), transparent 22%),
      radial-gradient(circle at 18% 76%, rgba(20, 184, 166, 0.35), transparent 28%),
      linear-gradient(135deg, #082f49 0%, #0f172a 58%, #134e4a 100%);
    box-shadow: 0 28px 80px rgba(15, 23, 42, 0.2);
    position: relative;
    overflow: hidden;
  }

  .auth-hero::after {
    content: "";
    position: absolute;
    inset: auto 42px 42px auto;
    width: 180px;
    height: 180px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.22);
    background: rgba(255, 255, 255, 0.08);
  }

  .auth-kicker {
    display: inline-flex;
    padding: 8px 13px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.14);
    border: 1px solid rgba(255, 255, 255, 0.22);
    font-size: 13px;
    font-weight: 700;
  }

  .auth-title {
    margin-top: 28px;
    font-family: var(--font-display);
    font-size: clamp(38px, 5vw, 68px);
    line-height: 1.05;
    letter-spacing: -2px;
  }

  .auth-copy {
    max-width: 560px;
    margin-top: 20px;
    color: rgba(255, 255, 255, 0.78);
    font-size: 16px;
    line-height: 1.9;
  }

  .auth-card {
    padding: 28px;
    border-radius: 28px;
    background: #fff;
    border: 1px solid rgba(148, 163, 184, 0.2);
    box-shadow: 0 22px 60px rgba(15, 23, 42, 0.12);
  }

  .auth-tabs {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 6px;
    border-radius: 18px;
    background: #f1f5f9;
    margin-bottom: 22px;
  }

  .auth-tab {
    border: 0;
    border-radius: 14px;
    padding: 11px 14px;
    background: transparent;
    color: #64748b;
    font-weight: 800;
    cursor: pointer;
  }

  .auth-tab.active {
    background: #fff;
    color: #0f172a;
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
  }

  .auth-form {
    display: grid;
    gap: 14px;
  }

  .auth-field {
    display: grid;
    gap: 7px;
  }

  .auth-label {
    color: #334155;
    font-size: 13px;
    font-weight: 800;
  }

  .auth-input {
    width: 100%;
    min-height: 48px;
    border: 1px solid #dbe4ef;
    border-radius: 14px;
    padding: 0 14px;
    color: #0f172a;
    background: #fff;
    outline: none;
  }

  .auth-input:focus {
    border-color: #10b981;
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12);
  }

  .auth-actions {
    display: grid;
    gap: 12px;
    margin-top: 8px;
  }

  .auth-status {
    min-height: 42px;
    padding: 11px 13px;
    border-radius: 14px;
    background: #f8fafc;
    color: #475569;
    font-size: 13px;
    line-height: 1.55;
    border: 1px solid #e2e8f0;
  }

  .auth-status[data-tone="success"] {
    background: #ecfdf5;
    border-color: #a7f3d0;
    color: #047857;
  }

  .auth-status[data-tone="error"] {
    background: #fff1f2;
    border-color: #fecdd3;
    color: #be123c;
  }

  @media (max-width: 980px) {
    .auth-shell {
      grid-template-columns: 1fr;
    }

    .auth-hero {
      min-height: auto;
    }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <main class="main" id="main">
    <div class="content">
      <div class="auth-shell">
        <section class="auth-hero">
          <div class="auth-kicker">NovaRead 学习账号</div>
          <h1 class="auth-title">注册后保存你的阅读进度与学习记录</h1>
          <p class="auth-copy">学生可以使用邮箱创建账号，登录后进入“我的学习”查看近期课程、学习时间与后续个性化学习数据。</p>
        </section>

        <section class="auth-card">
          <div class="auth-tabs">
            <button class="auth-tab active" type="button" data-mode="login">登录</button>
            <button class="auth-tab" type="button" data-mode="register">注册</button>
          </div>

          <form class="auth-form" id="user-auth-form">
            <label class="auth-field" data-register-only>
              <span class="auth-label">姓名</span>
              <input class="auth-input" id="auth-display-name" type="text" autocomplete="name" placeholder="例如：林同学" />
            </label>

            <label class="auth-field">
              <span class="auth-label">邮箱</span>
              <input class="auth-input" id="auth-email" type="email" autocomplete="email" placeholder="your@email.com" required />
            </label>

            <label class="auth-field">
              <span class="auth-label">密码</span>
              <input class="auth-input" id="auth-password" type="password" autocomplete="current-password" placeholder="至少 8 位" required />
            </label>

            <label class="auth-field" data-register-only>
              <span class="auth-label">学校（可选）</span>
              <input class="auth-input" id="auth-school-name" type="text" autocomplete="organization" placeholder="学校名称" />
            </label>

            <div class="auth-status" id="auth-status" data-tone="neutral">请输入邮箱和密码登录；没有账号可以切换到注册。</div>

            <div class="auth-actions">
              <button class="btn btn-primary" id="auth-submit" type="submit">登录</button>
              <a class="btn btn-secondary" href="overview.html">先浏览课程</a>
            </div>
          </form>
        </section>
      </div>
    </div>
  </main>
</div>
<script src="shell.js?v=20260427-auth1"></script>
<script src="user-auth.js?v=20260427-auth1"></script>
</body>
</html>
